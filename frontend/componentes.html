<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Componentes — Madeira Verde</title>
  <link rel="stylesheet" href="/static/css/style.css" />

  <style>
    .campos-extras { display: none; }
    .campos-extras.visivel { display: contents; }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      transition: opacity .2s, transform .1s;
    }
    .btn-icon:hover  { opacity: .85; transform: scale(1.1); }
    .btn-icon:active { transform: scale(.95); }

    .btn-ver     { background: #3b82f6; color: #fff; }
    .btn-editar  { background: #f59e0b; color: #fff; }
    .btn-excluir { background: #ef4444; color: #fff; }

    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.aberto { display: flex; }

    #modal-caixa {
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      width: min(95vw, 560px);
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,.25);
      position: relative;
      animation: modalEntrar .2s ease;
    }
    @keyframes modalEntrar {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #modal-titulo {
      margin: 0 0 1.25rem;
      font-size: 1.2rem;
      color: var(--verde-escuro, #1a5c2a);
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: .6rem;
    }

    #modal-corpo p {
      margin: .45rem 0;
      font-size: .95rem;
      line-height: 1.6;
    }
    #modal-corpo strong { color: #374151; }

    #modal-corpo .modal-bloco {
      background: #f9fafb;
      border-left: 3px solid var(--verde-escuro, #1a5c2a);
      border-radius: 4px;
      padding: .6rem .9rem;
      margin: .6rem 0;
      font-size: .9rem;
      white-space: pre-wrap;
      color: #374151;
    }

    .badge-materia    { background: #d1fae5; color: #065f46; }
    .badge-material   { background: #dbeafe; color: #1e40af; }
    .badge-maquina    { background: #fef3c7; color: #92400e; }
    .badge-ferramenta { background: #ede9fe; color: #5b21b6; }

    .badge-manut {
      display: inline-block;
      background: #fee2e2;
      color: #991b1b;
      padding: .2rem .65rem;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
    }

    #modal-fechar {
      margin-top: 1.5rem;
      display: block;
      width: 100%;
      padding: .6rem;
      background: #6b7280;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background .2s;
    }
    #modal-fechar:hover { background: #4b5563; }

    #btn-cancelar-edicao { display: none; }
  </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="/static/index.html">
      <span class="logo-icon">🌿</span>Madeira Verde
    </a>
    <ul class="navbar-links">
      <li><a href="/static/fornecedores.html">Fornecedores</a></li>
      <li><a href="/static/componentes.html" class="active">Componentes</a></li>
      <li><a href="/static/produtos.html">Produtos</a></li>
      <li><a href="/static/empregados.html">Empregados</a></li>
      <li><a href="/static/clientes.html">Clientes</a></li>
      <li><a href="/static/encomendas.html">Encomendas</a></li>
      <li><a href="/static/manutencoes.html">Manutenções</a></li>
      <li><a href="/static/dashboard.html">Dashboard</a></li>
    </ul>
  </nav>


  <main>

    <div class="card">
      <div class="card-header">
        <span class="icon">🔩</span>
        <h2 id="titulo-form-comp">Cadastro de Componente</h2>
      </div>

      <div id="alerta-comp" class="alert alert-hidden"></div>

      <form id="form-componente" novalidate>

        <input type="hidden" id="componente-id" value="" />

        <div class="form-grid">

          <div class="form-group">
            <label for="nome-comp">Nome <span class="required">*</span></label>
            <input type="text" id="nome-comp"
                   placeholder="Nome do componente" required />
          </div>

          <div class="form-group">
            <label for="tipo-comp">Tipo <span class="required">*</span></label>
            <select id="tipo-comp" onchange="alterarCampos()" required>
              <option value="">Selecione o tipo...</option>
              <option value="MATERIA_PRIMA">Matéria-Prima</option>
              <option value="MATERIAL_DIVERSO">Material Diverso</option>
              <option value="MAQUINA">Máquina</option>
              <option value="FERRAMENTA">Ferramenta</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label for="desc-comp">Descrição</label>
            <textarea id="desc-comp" placeholder="Descrição..."></textarea>
          </div>

          <!-- MATÉRIA-PRIMA -->
          <div class="form-group campos-extras" id="campo-origem">
            <label for="origem">Origem</label>
            <input type="text" id="origem" placeholder="Ex: Brasil, Canadá" />
          </div>
          <div class="form-group campos-extras" id="campo-madeira">
            <label for="tipo-madeira">Tipo de Madeira</label>
            <input type="text" id="tipo-madeira" placeholder="Ex: Pinus, MDF" />
          </div>
          <div class="form-group campos-extras" id="campo-certif">
            <label for="certificacao">Certificação</label>
            <input type="text" id="certificacao" placeholder="Ex: FSC, IBAMA" />
          </div>

          <!-- MATERIAL DIVERSO -->
          <div class="form-group campos-extras" id="campo-categ">
            <label for="categoria-comp">Categoria</label>
            <input type="text" id="categoria-comp"
                   placeholder="Ex: Parafuso, Cola" />
          </div>
          <div class="form-group campos-extras" id="campo-marca">
            <label for="marca-comp">Marca</label>
            <input type="text" id="marca-comp" placeholder="Marca do produto" />
          </div>

          <!-- MÁQUINA -->
          <div class="form-group campos-extras" id="campo-modelo">
            <label for="modelo">Modelo</label>
            <input type="text" id="modelo" placeholder="Modelo da máquina" />
          </div>
          <div class="form-group campos-extras" id="campo-fabr">
            <label for="fabricante">Fabricante</label>
            <input type="text" id="fabricante" placeholder="Fabricante" />
          </div>
          <div class="form-group campos-extras" id="campo-serie">
            <label for="n-serie">Número de Série</label>
            <input type="text" id="n-serie" placeholder="N° de série" />
          </div>
          <div class="form-group campos-extras" id="campo-vida">
            <label for="tempo-vida">Tempo Médio de Vida (meses)</label>
            <input type="number" id="tempo-vida" min="1" placeholder="Ex: 120" />
          </div>
          <div class="form-group campos-extras" id="campo-compra">
            <label for="data-compra">Data da Compra</label>
            <input type="date" id="data-compra" />
          </div>
          <div class="form-group campos-extras" id="campo-garantia">
            <label for="data-garantia">Fim da Garantia</label>
            <input type="date" id="data-garantia" />
          </div>

          <!-- FERRAMENTA -->
          <div class="form-group campos-extras" id="campo-tipo-ferra">
            <label for="tipo-ferramenta">Tipo de Ferramenta</label>
            <select id="tipo-ferramenta">
              <option value="">Selecione...</option>
              <option>Manual</option>
              <option>Elétrica</option>
              <option>Pneumática</option>
              <option>Hidráulica</option>
            </select>
          </div>

        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary"
                  onclick="document.getElementById('form-componente').reset();
                           document.getElementById('componente-id').value='';
                           alterarCampos();">
            🗑️ Limpar
          </button>

          <button type="button" class="btn btn-secondary"
                  id="btn-cancelar-edicao"
                  onclick="cancelarEdicaoComponente()">
            ✖ Cancelar Edição
          </button>

          <button type="submit" class="btn btn-primary" id="btn-comp">
            💾 Salvar Componente
          </button>
        </div>
      </form>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="icon">📋</span>
        <h2>Componentes Cadastrados</h2>
        <div style="margin-left:auto; display:flex; gap:0.5rem;">
          <select id="filtro-tipo" onchange="carregarComponentes()"
                  style="padding:0.4rem 0.6rem; border-radius:6px;
                         border:1.5px solid var(--cinza-medio);">
            <option value="">Todos os tipos</option>
            <option value="MATERIA_PRIMA">Matéria-Prima</option>
            <option value="MATERIAL_DIVERSO">Material Diverso</option>
            <option value="MAQUINA">Máquina</option>
            <option value="FERRAMENTA">Ferramenta</option>
          </select>
          <button class="btn btn-secondary btn-sm" onclick="carregarComponentes()">
            🔄
          </button>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>Tipo</th>
              <th>Descrição</th>
              <th style="text-align:center; width:110px;">Ações</th>
            </tr>
          </thead>
          <tbody id="tbody-componentes">
            <tr>
              <td colspan="5" style="text-align:center; padding:2rem;
                                     color:var(--cinza-escuro)">
                Carregando...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <footer>
    <p>🌿 Madeira Verde</p>
  </footer>

  <div id="modal-overlay" role="dialog" aria-modal="true"
       aria-labelledby="modal-titulo"
       onclick="fecharModalFora(event)">
    <div id="modal-caixa">
      <h3 id="modal-titulo">Detalhes do Componente</h3>
      <div id="modal-corpo"></div>
      <button id="modal-fechar" onclick="fecharModal()">✖ Fechar</button>
    </div>
  </div>

  <!-- ⚠️ Modal helpers ANTES dos scripts JS -->
  <script>
    function abrirModal(titulo, corpoHTML) {
      document.getElementById('modal-titulo').textContent = titulo;
      document.getElementById('modal-corpo').innerHTML   = corpoHTML;
      document.getElementById('modal-overlay').classList.add('aberto');
      document.getElementById('modal-fechar').focus();
    }
    function fecharModal() {
      document.getElementById('modal-overlay').classList.remove('aberto');
    }
    function fecharModalFora(e) {
      if (e.target === document.getElementById('modal-overlay')) fecharModal();
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') fecharModal();
    });
  </script>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/componentes.js"></script>

</body>
</html>
